<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tryb Offline - MostPomocy.pl</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .card { background: rgba(255,255,255,0.05); border-radius: 40px; padding: 40px; border: 1px solid rgba(255,255,255,0.1); max-width: 500px; width: 100%; }
        h1 { font-size: 2rem; margin-bottom: 20px; letter-spacing: -1px; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 30px; }
        .num-list { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: left; }
        .num-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .num-item:last-child { border: none; }
        .num-label { font-weight: 900; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #3b82f6; }
        .num-value { font-weight: 900; font-size: 18px; }
    </style>
</head>
<body>
    <div class="card">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"></path></svg>
        <h1>Brak Internetu</h1>
        <p>Jesteś w trybie offline. Nawet bez sieci możesz wezwać pomoc. Oto najważniejsze numery interwencyjne:</p>
        
        <div class="num-list">
            <div class="num-item">
                <span class="num-label">Centrum Ratunkowe</span>
                <span class="num-value">112</span>
            </div>
            <div class="num-item">
                <span class="num-label">Telefon Zaufania</span>
                <span class="num-value">116 123</span>
            </div>
            <div class="num-item">
                <span class="num-label">Niebieska Linia</span>
                <span class="num-value">800 120 002</span>
            </div>
            <div class="num-item">
                <span class="num-label">Linia dla Dzieci</span>
                <span class="num-value">116 111</span>
            </div>
        </div>
        
        <p style="margin-top: 30px; font-size: 12px;">Strona załaduje się automatycznie po odzyskaniu połączenia.</p>
    </div>
</body>
</html>
